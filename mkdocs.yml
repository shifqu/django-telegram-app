site_name: django-telegram-app
site_url: https://shifqu.github.io/django-telegram-app/

theme:
  name: material
  favicon: assets/favicon.png
  logo: assets/favicon.png
  icon:
    repo: fontawesome/brands/github
  features:
    - content.code.annotate
    - content.code.copy
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

repo_url: https://github.com/shifqu/django-telegram-app
repo_name: GitHub

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_submodules: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Bot Commands: bot-commands.md
  - Management Commands: management-commands.md
  - Swappable TelegramSetting: swappable-telegram-settings.md
  - API Reference: api.md
