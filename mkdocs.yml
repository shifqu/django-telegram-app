site_name: django-telegram-app
site_url: https://shifqu.github.io/django-telegram-app/

theme:
  name: material
  favicon: assets/logo_01_transparent_black.png
  logo: assets/logo_01_transparent_white.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - content.code.copy
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      linenums: true
      anchor_linenums: true
  - pymdownx.superfences
  - attr_list
  - toc:
      permalink: true

repo_url: https://github.com/shifqu/django-telegram-app
repo_name: GitHub

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_submodules: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Bot Commands: bot-commands-new.md
  - Management Commands: management-commands.md
  - Swappable TelegramSetting: swappable-telegram-settings.md
  - Testing: testing.md
  - API Reference: api.md
